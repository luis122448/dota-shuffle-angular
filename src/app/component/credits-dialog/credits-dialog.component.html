<main
  class="default-container-light flex flex-col sapce-y-4 w-full h-full items-center rounded-md"
>
  <section class="h-[250px] w-[600px]">
    <div id="default-carousel" class="relative w-full" data-carousel="slide">
      <div class="relative h-64 overflow-hidden rounded-md bg-red-500 z-0">
        <!-- Item 1 -->
        <div class="hidden duration-700 ease-in-out" data-carousel-item>
          <img
            src="./../../../assets/image/wallpaper/top-dota.webp"
            class="h-64 absolute object-cover block w-full -translate-x-1/2 -translate-y-1/2 top-1/2 left-1/2"
            alt="top-dota"
            loading="lazy"
          />
        </div>
        <!-- Item 2 -->
        <div class="hidden duration-700 ease-in-out" data-carousel-item>
          <img
            src="./../../../assets/image/wallpaper/tama-dota.webp"
            class="h-64 absolute object-cover block w-full -translate-x-1/2 -translate-y-1/2 top-1/2 left-1/2"
            alt="tama-dota"
            loading="lazy"
          />
        </div>
        <!-- Item 3 -->
        <div class="hidden duration-700 ease-in-out" data-carousel-item>
          <img
            src="/./../../../assets/image/wallpaper/hero-dota.webp"
            class="h-64 absolute object-cover block w-full -translate-x-1/2 -translate-y-1/2 top-1/2 left-1/2"
            alt="hero-dota"
            loading="lazy"
          />
        </div>
      </div>
      <!-- Slider indicators -->
    <div class="absolute z-30 flex -translate-x-1/2 bottom-5 left-1/2 space-x-3 rtl:space-x-reverse">
      <button type="button" class="w-3 h-3 rounded-full" aria-current="true" aria-label="Slide 1" data-carousel-slide-to="0"></button>
      <button type="button" class="w-3 h-3 rounded-full" aria-current="false" aria-label="Slide 2" data-carousel-slide-to="1"></button>
      <button type="button" class="w-3 h-3 rounded-full" aria-current="false" aria-label="Slide 3" data-carousel-slide-to="2"></button>
  </div>
    </div>
  </section>
  <section
    class="h-full w-96 flex flex-col space-y-2 items-center justify-around py-2"
  >
    <h1
      class="font-semibold text-center text-sm text-slate-700 dark:bg-none dark:text-gray-200"
    >
      En Memoria de Tama ( Top 6 N.A )
      <br /><span class="resalt-text">Banned 2038</span>
    </h1>
    <p class="text-inline-md text-left">
      Primer jugardor de <span class="resalt-text">La Mantita</span> en alcanzar
      el TOP 6. Maestro con todos los heroes al nivel
      <span class="resalt-text">30</span> ( Excepto Muerta )<br />
      Gracias por tu legado en
      <span class="resalt-text">DOTA 2.</span>
    </p>
    <app-button-standard
      [optionBtn]="'close'"
      [typeBtn]="'button'"
      [colorBtn]="'red'"
      (click)="closeDialog()"
      class="pb-2"
    >
      Close
    </app-button-standard>
  </section>
</main>
